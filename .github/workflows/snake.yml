name: Generate Snake

on:
  # Roda a cada 12 horas automaticamente
  schedule:
    - cron: "0 */12 * * *"
  
  # Permite rodar manualmente na aba Actions
  workflow_dispatch:
  
  # Roda sempre que houver push na branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera o jogo da cobrinha a partir do gráfico de contribuições
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#FF6B1A&color_dots=#e2e8f0,#b3e5fc,#4fc3f7,#0288d1,#01579b
            dist/github-contribution-grid-snake-dark.svg?color_snake=#FF6B1A&color_dots=#0f1117,#0a2d40,#1a5d7c,#2e94c1,#4FC3F7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Faz o push do SVG gerado para a branch "output"
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
